name: kinetic
description: App de treinos personalizados — Personal Trainer & Aluno
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Estado & Arquitetura ---
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # --- Rede ---
  dio: ^5.4.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # --- Armazenamento seguro ---
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # --- Auth ---
  google_sign_in: ^6.2.1
  jwt_decoder: ^2.0.1

  # --- Navegação ---
  go_router: ^13.0.0

  # --- UI ---
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.68.0           # gráficos de progresso
  percent_indicator: ^4.2.3   # círculo de ADR %
  drag_and_drop_lists: ^0.4.2 # reordenar exercícios

  # --- Timer & Utils ---
  just_audio: ^0.9.36          # som no timer de descanso
  wakelock_plus: ^1.1.4        # manter tela ligada no treino
  intl: ^0.19.0
  timeago: ^3.6.0

  # --- Injeção de dependência ---
  get_it: ^7.6.7
  injectable: ^2.3.2

  # --- Variáveis de ambiente ---
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Geração de código ---
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

  # --- Testes ---
  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  mockito: ^5.4.4

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env

  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Black.ttf
          weight: 900
        - asset: assets/fonts/Lexend-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lexend-Regular.ttf
          weight: 400
